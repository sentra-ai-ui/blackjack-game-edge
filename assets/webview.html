<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blackjack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d4f1c; color: white; min-height: 100vh; padding: 10px; }
    .table { background: linear-gradient(135deg, #1a5c2e 0%, #0d4f1c 100%); border-radius: 14px; padding: 14px; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
    .label { font-size: 10px; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .hand { display: flex; gap: 6px; flex-wrap: wrap; min-height: 60px; margin-bottom: 10px; }
    .card { display: flex; align-items: center; justify-content: center; padding: 8px 10px; background: white; color: #1a1a1a; border-radius: 6px; font-weight: bold; font-size: 16px; min-width: 42px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .card.red { color: #c41e3a; }
    .card.hidden { background: linear-gradient(135deg, #1e3a5f, #0d1f33); color: #ffd700; font-size: 18px; border: 2px solid #3a6ea5; }
    .total { font-size: 13px; background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 6px; display: inline-block; }
    .total span { color: #ffd700; font-weight: bold; }
    .sep { height: 1px; background: rgba(255,255,255,0.1); margin: 12px 0; }
    .message { text-align: center; font-size: 15px; font-weight: bold; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .message.win { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
    .message.lose { background: linear-gradient(135deg, #f44336, #c62828); }
    .message.push { background: linear-gradient(135deg, #ff9800, #f57c00); }
    .message.bj { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a1a; }
    .message.bust { background: linear-gradient(135deg, #9c27b0, #6a1b9a); }
    .message.playing { background: rgba(0,0,0,0.2); }
    .footer { text-align: center; font-size: 11px; color: #888; margin-top: 8px; }
    .cards-left { font-size: 11px; color: #aaa; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="table">
    <div class="label">Dealer</div>
    <div id="dealer-hand" class="hand"></div>
    <div class="total">Total: <span id="dealer-total">?</span></div>
    
    <div class="sep"></div>
    
    <div class="label">Your Hand</div>
    <div id="player-hand" class="hand"></div>
    <div class="total">Total: <span id="player-total">0</span></div>
    
    <div id="message" class="message playing">Loading...</div>
    
    <div class="cards-left">Cards remaining: <span id="cards-left">312</span></div>
    <div class="footer">Say "hit" or "stand"</div>
  </div>

  <script>
    function getState() {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('state');
      if (!encoded) return null;
      try {
        return JSON.parse(decodeURIComponent(encoded));
      } catch (e) { return null; }
    }
    
    function render(state) {
      if (!state) {
        document.getElementById('message').textContent = 'Say "start" to begin';
        return;
      }
      
      // Player cards
      document.getElementById('player-hand').innerHTML = state.playerCards.map(c => {
        const isRed = c.includes('♥') || c.includes('♦');
        return '<div class="card' + (isRed ? ' red' : '') + '">' + c + '</div>';
      }).join('');
      document.getElementById('player-total').textContent = state.playerTotal;
      
      // Dealer cards
      if (state.dealerHidden && state.dealerCards.length > 0) {
        document.getElementById('dealer-hand').innerHTML = 
          '<div class="card hidden">?</div>';
        document.getElementById('dealer-total').textContent = '?';
      } else {
        document.getElementById('dealer-hand').innerHTML = state.dealerCards.map(c => {
          const isRed = c.includes('♥') || c.includes('♦');
          return '<div class="card' + (isRed ? ' red' : '') + '">' + c + '</div>';
        }).join('');
        document.getElementById('dealer-total').textContent = state.dealerTotal;
      }
      
      // Message
      const msgEl = document.getElementById('message');
      msgEl.textContent = state.message;
      const outcome = state.outcome || '';
      if (outcome === 'win' || outcome === 'player_bj') msgEl.className = 'message win';
      else if (outcome === 'lose' || outcome === 'dealer_bj') msgEl.className = 'message lose';
      else if (outcome === 'bust') msgEl.className = 'message bust';
      else if (outcome === 'push') msgEl.className = 'message push';
      else msgEl.className = 'message playing';
      
      // Cards remaining
      document.getElementById('cards-left').textContent = state.cardsRemaining || 312;
      
      // Footer
      document.querySelector('.footer').textContent = state.nextHint || '';
    }
    
    render(getState());
  </script>
</body>
</html>
