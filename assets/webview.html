<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blackjack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d4f1c; color: white; min-height: 100vh; padding: 12px; }
    .table { background: linear-gradient(135deg, #1a5c2e 0%, #0d4f1c 100%); border-radius: 14px; padding: 16px; max-width: 440px; margin: 0 auto; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
    .score { display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 13px; }
    .score span { background: rgba(0,0,0,0.25); padding: 4px 12px; border-radius: 20px; }
    .score .w { color: #4CAF50; }
    .score .l { color: #f44336; }
    .score .p { color: #ff9800; }
    .label { font-size: 10px; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .hand-section { margin-bottom: 12px; }
    .hand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .hand-name { font-size: 11px; color: #ccc; }
    .hand-badge { font-size: 10px; background: #2196F3; padding: 2px 8px; border-radius: 10px; }
    .cards { display: flex; gap: 6px; flex-wrap: wrap; min-height: 60px; }
    .card { display: flex; align-items: center; justify-content: center; padding: 8px 12px; background: white; color: #1a1a1a; border-radius: 6px; font-weight: bold; font-size: 16px; min-width: 42px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .card.red { color: #c41e3a; }
    .card.hidden { background: linear-gradient(135deg, #1e3a5f, #0d1f33); color: #ffd700; font-size: 20px; border: 2px solid #3a6ea5; }
    .total { font-size: 13px; background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 6px; margin-top: 4px; display: inline-block; }
    .total span { color: #ffd700; font-weight: bold; }
    .sep { height: 1px; background: rgba(255,255,255,0.1); margin: 12px 0; }
    .msg { text-align: center; font-size: 14px; font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
    .msg.win     { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
    .msg.lose    { background: linear-gradient(135deg, #f44336, #c62828); }
    .msg.push    { background: linear-gradient(135deg, #ff9800, #f57c00); }
    .msg.bust    { background: linear-gradient(135deg, #9c27b0, #6a1b9a); }
    .msg.bj      { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a1a; }
    .msg.playing { background: rgba(0,0,0,0.15); }
    .buttons { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
    button { padding: 12px 8px; font-size: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.15s; }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-new  { background: linear-gradient(135deg, #2196F3, #1565C0); color: white; }
    .btn-hit  { background: linear-gradient(135deg, #4CAF50, #388E3C); color: white; }
    .btn-stand{ background: linear-gradient(135deg, #f44336, #c62828); color: white; }
    .btn-split{ background: linear-gradient(135deg, #9c27b0, #6a1b9a); color: white; }
    .hint { text-align: center; font-size: 11px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="table">
    <div class="score">
      <span class="w">W: <span id="wins">0</span></span>
      <span class="l">L: <span id="losses">0</span></span>
      <span class="p">P: <span id="pushes">0</span></span>
    </div>
    
    <div class="sep"></div>
    
    <div class="hand-section">
      <div class="label">Dealer</div>
      <div id="dealer-cards" class="cards"></div>
      <div class="total">Total: <span id="dealer-total">?</span></div>
    </div>
    
    <div id="hands-container"></div>
    
    <div id="message" class="msg playing"></div>
    
    <div class="buttons">
      <button class="btn-new"  onclick="doAction('new_game')">New</button>
      <button class="btn-hit"  onclick="doAction('hit')"     id="btn-hit">Hit</button>
      <button class="btn-stand" onclick="doAction('stand')" id="btn-stand">Stand</button>
      <button class="btn-split" onclick="doAction('split')" id="btn-split">Split</button>
    </div>
    
    <div id="hint" class="hint"></div>
  </div>

  <script>
    function getState() {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('state');
      if (!encoded) return null;
      try {
        return JSON.parse(decodeURIComponent(encoded));
      } catch (e) { return null; }
    }
    
    function doAction(action) {
      if (window.ai_edge_gallery && window.ai_edge_gallery.performAction) {
        window.ai_edge_gallery.performAction(action);
      }
    }
    
    function render(state) {
      if (!state) {
        document.getElementById('message').textContent = 'Loading...';
        return;
      }
      
      document.getElementById('wins').textContent = state.wins;
      document.getElementById('losses').textContent = state.losses;
      document.getElementById('pushes').textContent = state.pushes;
      
      // Dealer
      document.getElementById('dealer-cards').innerHTML = state.dc.map(c =>
        c === '??' ? '<div class="card hidden">?</div>' : '<div class="card">' + c + '</div>'
      ).join('');
      document.getElementById('dealer-total').textContent = state.dt;
      
      // Player hands
      const container = document.getElementById('hands-container');
      container.innerHTML = '';
      state.hands.forEach((h, i) => {
        const div = document.createElement('div');
        div.className = 'hand-section';
        div.innerHTML = 
          '<div class="hand-header">' +
            '<div class="hand-name">Hand ' + (i+1) + (state.hands.length > 1 ? ' of ' + state.hands.length : '') + '</div>' +
            (h.active ? '<div class="hand-badge">Your Turn</div>' : '') +
          '</div>' +
          '<div class="cards">' + h.pc.map(c => '<div class="card">' + c + '</div>').join('') + '</div>' +
          '<div class="total">Total: <span>' + h.pt + '</span></div>';
        container.appendChild(div);
      });
      
      // Message
      const msgEl = document.getElementById('message');
      msgEl.textContent = state.msg;
      const st = state.st;
      msgEl.className = 'msg ' + (st === 'win' || st === 'bj' || st === 'dealer_bust' ? 'win' : 
        st === 'lose' || st === 'l' ? 'lose' : st === 'bust' ? 'bust' : st === 'push' ? 'push' : 'playing');
      
      // Buttons
      const isGameOver = state.st === 'win' || state.st === 'lose' || state.st === 'push' || state.st === 'bust';
      document.getElementById('btn-hit').disabled = isGameOver || state.hands.every(h => h.st === 'bust');
      document.getElementById('btn-stand').disabled = isGameOver || state.hands.every(h => h.st === 'bust');
      document.getElementById('btn-split').disabled = isGameOver || !state.split;
      document.getElementById('hint').textContent = state.next;
    }
    
    render(getState());
    
    // Listen for state updates from app
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'gameState') {
        render(e.data.state);
      }
    });
  </script>
</body>
</html>
